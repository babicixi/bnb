# Render Blueprint — one-click deploy of Cixi Wanderlust.
# Connect this repo on Render → New + → Blueprint, and Render will create
# the web service + persistent disk wired up to the env vars below.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: bnb
    runtime: node
    plan: starter           # ~$7/mo. Persistent disks require a paid plan.
    region: singapore       # closest to Vietnam visitors
    branch: master          # this repo's default branch (Render's default is `main`)
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true        # redeploy on every push to the connected branch
    disk:
      name: bnb-data
      mountPath: /data
      sizeGB: 10            # plenty of headroom for state.json + uploads
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /data
      - key: SESSION_SECRET
        generateValue: true # Render generates a long random string once
